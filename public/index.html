<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#6366f1">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Todos">
  <link rel="apple-touch-icon" href="/icon-180.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-top">
        <h1>My Todos</h1>
        <button id="ai-suggest-btn" class="ai-btn hidden" title="Get AI priority suggestions">✨ AI Suggest</button>
      </div>
      <p class="subtitle" id="count">0 tasks</p>
    </header>

    <div id="ai-modal" class="ai-modal hidden">
      <div class="ai-modal-content">
        <div class="ai-modal-header">
          <span class="ai-modal-title">✨ AI Priority Suggestion</span>
          <button id="ai-modal-close" class="ai-modal-close">&#x2715;</button>
        </div>
        <div id="ai-modal-body" class="ai-modal-body">
          <div class="ai-loading">Analyzing your todos...</div>
        </div>
      </div>
    </div>

    <form id="todo-form">
      <div class="input-group">
        <input type="text" id="todo-input" placeholder="Add a new task..." autocomplete="off" maxlength="200">
        <button type="submit">Add</button>
      </div>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul id="todo-list"></ul>

    <div id="empty-state" class="empty-state hidden">
      <p>No tasks here!</p>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
